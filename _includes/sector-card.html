{% assign sector = include.sector %}
<a href="{{ sector.url | relative_url }}" class="sector-card {{ sector.signal }}">
  <div class="signal-dot {{ sector.signal }}"></div>
  <div class="card-body">
    <div class="card-title">{{ sector.title }}</div>
    <div class="card-headline">{{ sector.headline }}</div>
    {% if sector.top_picks %}
    <div class="top-picks">
      {% for pick in sector.top_picks %}
        <span class="pick-chip">
          <span class="signal-dot {{ pick.signal }}" style="width:7px;height:7px;"></span>
          {{ pick.ticker }}
        </span>
      {% endfor %}
    </div>
    {% endif %}
  </div>
  <div class="card-arrow">›</div>
</a>
